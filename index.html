<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Has sido seleccionado para una grandiosa recompensa!</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            background-image: url('fondo.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #btn {
            padding: 80px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: #007bff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
            transition: transform 0.2s;
        }

        #btn:hover {
            transform: scale(1.05);
            background: #0056b3;
        }

        #videoContainer {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 100vh;
            background: black;
            z-index: 999;
        }

        video {
            width: 100%; 
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <button id="btn">RECLAMAR RECOMPENSA</button>

    <div id="videoContainer">
        <video id="trollVideo" playsinline>
            <source src="trolleo.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const container = document.getElementById('videoContainer');
        const video = document.getElementById('trollVideo');

        btn.addEventListener('click', () => {
            // 1. Mostrar el contenedor del video y ocultar el botón
            container.style.display = 'block';
            btn.style.display = 'none';

            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }

            video.volume = 1.0;
            video.play();

            video.onpause = () => {
                video.play();
            };
        });
    </script>
</body>
</html>
