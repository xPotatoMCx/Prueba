<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Has sido seleccionado! 🎁</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* Se añade la imagen de fondo aquí */
            background-image: url('fondo.jpg'); 
            background-size: cover; /* Para que la imagen cubra toda la pantalla */
            background-position: center; /* Para que la imagen esté centrada */
            background-repeat: no-repeat;
            background-color: #f0f2f5; /* Color de respaldo por si la imagen no carga */
            font-family: sans-serif;
            overflow: hidden;
        }

        #btn {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: #007bff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #videoContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 999;
        }

        video {
            width: 100%; height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <button id="btn">RECLAMAR PREMIO 🏆</button>

    <div id="videoContainer">
        <video id="trollVideo" playsinline>
            <source src="trolleo.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const container = document.getElementById('videoContainer');
        const video = document.getElementById('trollVideo');

        btn.addEventListener('click', () => {
            // 1. Mostrar contenedor
            container.style.display = 'block';[cite: 2]
            btn.style.display = 'none';[cite: 2]

            // 2. Intentar Pantalla Completa (Full Screen)[cite: 2]
            if (container.requestFullscreen) {[cite: 2]
                container.requestFullscreen();[cite: 2]
            } else if (container.webkitRequestFullscreen) {[cite: 2]
                container.webkitRequestFullscreen();[cite: 2]
            }

            // 3. Reproducir con audio[cite: 2]
            video.volume = 1.0;[cite: 2]
            video.play();[cite: 2]

            // 4. Truco: Si intenta pausar, se reproduce solo[cite: 2]
            video.onpause = () => video.play();[cite: 2]
        });
    </script>
</body>
</html>
